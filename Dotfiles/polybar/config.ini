;==========================================================
;
;   POLYBAR CONFIG - CATPPUCCIN STYLE
;
;==========================================================

[colors]
rosewater = #f5e0dc
flamingo = #f2cdcd
pink = #f5c2e7
mauve = #cba6f7
red = #f38ba8
maroon = #eba0ac
peach = #fab387
yellow = #f9e2af
green = #a6e3a1
teal = #94e2d5
sky = #89dceb
sapphire = #74c7ec
blue = #89b4fa
lavender = #b4befe
text = #cdd6f4
subtext1 = #bac2de
subtext0 = #a6adc8
overlay2 = #9399b2
overlay1 = #7f849c
overlay0 = #6c7086
surface2 = #585b70
surface1 = #45475a
surface0 = #313244
base = #1e1e2e
mantle = #181825
crust = #11111b
transparent = #00000000

[bar/main]
width = 98%
# height = 36
height = 29
offset-x = 1%
offset-y = 10
# radius = 16
fixed-center = true
bottom = false

override-redirect = true

background = ${colors.base}
foreground = ${colors.text}

line-size = 2
line-color = ${colors.blue}

border-size = 0
border-color = ${colors.transparent}

padding-left = 1
padding-right = 1

module-margin-left = 1
module-margin-right = 1

# separator = |
# separator-foreground = ${colors.surface1}

font-0 = "JetBrainsMono Nerd Font:style=Bold:size=10;3"
font-1 = "JetBrainsMono Nerd Font:size=12;3"
font-2 = "JetBrainsMono Nerd Font:size=18;4"

modules-left = rofi point i3  point xwindow
modules-center = point date point
modules-right = pulseaudio point memory point cpu point public-ip point powermenu

cursor-click = pointer
cursor-scroll = ns-resize

enable-ipc = true
wm-restack = i3

;==========================================================
; MODULES
;==========================================================

[module/i3]
type = internal/i3
pin-workspaces = true
show-urgent = true
strip-wsnumbers = true
index-sort = true
enable-click = true
enable-scroll = false
wrapping-scroll = false
reverse-scroll = false
fuzzy-match = true

; --- FOCUSED WORKSPACE (Active) ---
; We use direct HEX codes to avoid syntax parsing errors with nested variables.
; Surface1 (#313244) for the pill background, Mauve (#cba6f7) for the text.
; Structure: [Left Curve] [Background+Text] [Right Curve]

label-focused = "%{T3}%{F#313244}%{F-}%{T-}%{B#313244}%{F#cba6f7} %name% %{F-}%{B-}%{T3}%{F#313244}%{F-}%{T-}"
label-focused-background = ${colors.base}
label-focused-padding = 0

; --- UNFOCUSED WORKSPACE (Inactive) ---
; Simple text, no background, using Overlay1 (#7f849c)
label-unfocused = %name%
label-unfocused-padding = 1
label-unfocused-foreground = ${colors.overlay1}

; --- URGENT WORKSPACE (Alert) ---
; Red (#f38ba8) pill for urgency
label-urgent = "%{T3}%{F#f38ba8}%{F-}%{T-}%{B#f38ba8}%{F#1e1e2e} %name% %{F-}%{B-}%{T3}%{F#f38ba8}%{F-}%{T-}"
label-urgent-background = ${colors.base}
label-urgent-foreground = ${colors.red}
label-urgent-padding = 0

; --- VISIBLE WORKSPACE ---
label-visible = %name%
label-visible-padding = 1
label-visible-foreground = ${colors.text}

[module/rofi]
type = custom/text

; Sostituisci #313244 con il codice del tuo colore 'surface0' (o quello che vuoi per la pillola)
; Sostituisci #cba6f7 con il colore 'mauve' per l'icona
; %{T3} serve per usare il font grande (le curve)
; %{T-} torna al font normale

content = "%{T3}%{F#313244}%{F-}%{T-}%{B#313244}%{F#cba6f7} 󰣇 %{F-}%{B-}%{T3}%{F#313244}%{F-}%{T-}"

click-left = rofi -show drun -show-icons

[module/point]
type = custom/text
content = 
content-foreground = ${colors.surface1}
content-font = 1
content-padding = 1
content-margin = 0

[module/date]
type = internal/date
interval = 1
date = %H:%M
date-alt = %d-%m-%Y %H:%M:%S
label = %date%
label-foreground = ${colors.text}
format-prefix = "  "
format-prefix-foreground = ${colors.teal}

[module/pulseaudio]
type = internal/pulseaudio
format-volume = <ramp-volume> <label-volume>
label-volume = %percentage%%
label-volume-foreground = ${colors.text}
ramp-volume-0 = 
ramp-volume-1 = 
ramp-volume-2 = 
ramp-volume-foreground = ${colors.blue}
label-muted = 󰝟 Muted
label-muted-foreground = ${colors.overlay0}

[module/memory]
type = internal/memory
interval = 2
format-prefix = " "
format-prefix-foreground = ${colors.peach}
label = %percentage_used:2%%

[module/cpu]
type = internal/cpu
interval = 2
format-prefix = " "
format-prefix-foreground = ${colors.red}
label = %percentage:2%%

[module/wlan]
type = internal/network
interface-type = ens33
interval = 3.0
format-connected = <label-connected>
format-connected-prefix = "  "
format-connected-prefix-foreground = ${colors.green}
label-connected = %essid%

format-disconnected = <label-disconnected>
label-disconnected = "󰤮 "
label-disconnected-foreground = ${colors.red}

[module/eth]
type = internal/network
interface = ens33
interval = 3.0

format-connected = <label-connected>
format-connected-prefix = "󰈀 "
format-connected-prefix-foreground = ${colors.green}
label-connected = %local_ip%

format-disconnected = <label-disconnected>
label-disconnected = "󰈂 "
label-disconnected-foreground = ${colors.red}

[module/public-ip]
type = custom/script
exec = ~/.config/polybar/scripts/ip_monitor.sh
tail = true

label = %output%
label-foreground = ${colors.text}

# Left click: copy IP
click-left = kill -USR1 %pid%
# Right click: Info
click-right = kill -USR2 %pid%

[module/battery]
type = internal/battery
battery = BAT0
adapter = ADP1
full-at = 98

format-charging = <animation-charging> <label-charging>
format-discharging = <ramp-capacity> <label-discharging>

label-charging = %percentage%%
label-discharging = %percentage%%

ramp-capacity-0 = 
ramp-capacity-1 = 
ramp-capacity-2 = 
ramp-capacity-3 = 
ramp-capacity-4 = 
ramp-capacity-foreground = ${colors.sky}

animation-charging-0 = 
animation-charging-1 = 
animation-charging-2 = 
animation-charging-3 = 
animation-charging-4 = 
animation-charging-foreground = ${colors.green}
animation-charging-framerate = 750

[module/powermenu]
type = custom/text
label = " " 
label-foreground = ${colors.red}
click-left = ~/.config/rofi/scripts/powermenu.sh

[module/tray]
type = internal/tray
tray-padding = 2
tray-size = 65%
tray-background = ${colors.base}

[module/xwindow]
type = internal/xwindow
label = %title:0:60:...%
label-maxlen = 20
label-foreground = ${colors.mauve}
label-background = ${colors.base}
label-padding = 0
label-margin = 0
