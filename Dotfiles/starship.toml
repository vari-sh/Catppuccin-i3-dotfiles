# ~/.config/starship.toml

add_newline = true

# La struttura del prompt
format = '''
[в•ӯв”Җв”Җв”Җ](green)[[\[](Blue)$os[\]](Blue)](#cba6f7)[в”Җв”Җ](green)[\[](Blue)$directory[\]](Blue)[\[](Blue)$git_branch$git_status$python[\]](Blue)
[в•°в”Җ](green)$character'''

# La parte destra (Orario)
right_format = '''[\[](Blue)$time[\]](Blue)'''

palette = 'catppuccin_mocha'

# Configurazione Moduli
[username]
show_always = true
style_user = "fg:#cba6f7 bold"
format = '[пҲӣ $user ]($style)'

[hostname]
ssh_only = false
style = "fg:magenta bold"
format = '[| п„ү  $hostname]($style)'

[directory]
style = "fg:yellow bold"
format = '[[оӘғ $path]($style)](blue)'
truncation_length = 3
truncation_symbol = "вҖҰ/"

[python]
symbol = "оҳҶ"
style = "fg:green"
format = '[ $symbol ($version) ($virtualenv) ]($style)'

[time]
disabled = false
format = '[ пҗә  $time ](fg:cyan)'
time_format = "%Y-%m-%d %R"

[os]
disabled = false
style = "fg:mauve"
format = "[ $symbol ]($style)"

[os.symbols]
Windows = "оңҸ"
Ubuntu = "у°•Ҳ"
SUSE = "пҢ”"
Raspbian = "у°җҝ"
Mint = "у°Јӯ"
Macos = "у°Җө"
Manjaro = "пҢ’"
Linux = "у°ҢҪ"
Gentoo = "у°ЈЁ"
Fedora = "у°Јӣ"
Alpine = "пҢҖ"
Amazon = "пү°"
Android = "оңҺ"
AOSC = "пҢҒ"
Arch = "у°ЈҮ"
Artix = "у°ЈҮ"
CentOS = "пҢ„"
Debian = "у°Јҡ"
Redhat = "уұ„ӣ"
RedHatEnterprise = "уұ„ӣ"

[directory.substitutions]
"Documents" = "у°Ҳҷ "
"Downloads" = "пҖҷ "
"Music" = "у°қҡ "
"Pictures" = "пҖҫ "
"Developer" = "у°ІӢ "

[git_branch]
symbol = "пҗҳ"
style = "fg:yellow"
format = '[[ $symbol $branch ](fg:yellow)]($style)'

[git_status]
style = "fg:yellow"
format = '[[($all_status$ahead_behind )](fg:yellow)]($style)'

[nodejs]
symbol = "оңҳ"
style = "bg:green"
format = '[[ $symbol( $version) ](fg:crust bg:green)]($style)'

[c]
symbol = "оҳһ "
style = "bg:green"
format = '[[ $symbol( $version) ](fg:crust bg:green)]($style)'

[rust]
symbol = "оһЁ"
style = "bg:green"
format = '[[ $symbol( $version) ](fg:crust bg:green)]($style)'

[golang]
symbol = "оҳ§"
style = "bg:green"
format = '[[ $symbol( $version) ](fg:crust bg:green)]($style)'

[php]
symbol = "оҳҲ"
style = "bg:green"
format = '[[ $symbol( $version) ](fg:crust bg:green)]($style)'

[java]
symbol = "оү– "
style = "bg:green"
format = '[[ $symbol( $version) ](fg:crust bg:green)]($style)'

[kotlin]
symbol = "оҳҙ"
style = "bg:green"
format = '[[ $symbol( $version) ](fg:crust bg:green)]($style)'

[haskell]
symbol = "оҳҹ"
style = "bg:green"
format = '[[ $symbol( $version) ](fg:crust bg:green)]($style)'

[docker_context]
symbol = "пҢҲ"
style = "bg:sapphire"
format = '[[ $symbol( $context) ](fg:crust bg:sapphire)]($style)'

[conda]
symbol = " п„Ң "
style = "fg:crust bg:sapphire"
format = '[$symbol$environment ]($style)'
ignore_base = false

[line_break]
disabled = false

[character]
disabled = false
success_symbol = '[вқҜ](bold fg:blue)'
error_symbol = '[вқҜ](bold fg:red)'
vimcmd_symbol = '[вқ®](bold fg:green)'
vimcmd_replace_one_symbol = '[вқ®](bold fg:lavender)'
vimcmd_replace_symbol = '[вқ®](bold fg:lavender)'
vimcmd_visual_symbol = '[вқ®](bold fg:yellow)'

[cmd_duration]
show_milliseconds = true
format = "о«ҙ in $duration "
style = "bg:lavender"
disabled = false
show_notifications = true
min_time_to_notify = 45000

